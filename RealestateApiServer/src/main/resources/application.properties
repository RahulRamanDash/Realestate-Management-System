spring.application.name=RealestateApiServer

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/realestate_db}
spring.data.mongodb.auto-index-creation=true

# File storage
file.upload-dir=${UPLOAD_DIR:/var/www/realestate/uploads}

# JWT
# Local development fallback only. Override with JWT_SECRET in deployed environments.
security.jwt.secret=${JWT_SECRET:local-development-jwt-secret-key-change-before-deploy-1234567890}
# 15 minutes
security.jwt.expiration-ms=900000
# 7 days
security.jwt.refresh-expiration-ms=604800000

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

server.forward-headers-strategy=framework
