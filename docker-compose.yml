services:
  mongo:
    image: mongo:7
    container_name: realestate-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./RealestateApiServer
    container_name: realestate-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/${MONGO_DB_NAME:-realestate_db}}
      UPLOAD_DIR: /var/www/realestate/uploads
      JWT_SECRET: ${JWT_SECRET:-local-development-jwt-secret-key-change-before-deploy-1234567890}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:80,http://localhost}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - uploads_data:/var/www/realestate/uploads

  frontend:
    build:
      context: ./realestate-frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: realestate-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  mongo_data:
  uploads_data:
